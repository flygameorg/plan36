.bar {
  width: 240px;
  height: 10px;
  border: 1px solid #00ff9d;
  margin-top: 12px;
  position: relative;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 35%;
  background: #00ff9d;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.3; width: 20%; }
  50% { opacity: 1; width: 60%; }
  100% { opacity: 0.3; width: 20%; }
}
</style>
</head>
